name: musika_apk
description: "Musika - Your music, everywhere"
publish_to: 'none'
version: 1.0.1+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.3.0
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  audioplayers: ^6.4.0
  just_audio: ^0.9.43
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  flutter_inappwebview: ^6.1.5
  shimmer: ^3.0.0
  flutter_local_notifications: ^18.0.1
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  lottie: ^3.3.1
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
