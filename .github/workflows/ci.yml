name: Flutter CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29'
          channel: 'stable'
      - name: Cache Flutter deps
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter
          key: flutter-${{ hashFiles('pubspec.lock') }}
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings

  test:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter test

  build:
    needs: [analyze, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29'
          channel: 'stable'
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      - run: flutter pub get
      - name: Build ${{ matrix.arch }}
        run: flutter build apk --release --target-platform android-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: musika-${{ matrix.arch }}
          path: build/app/outputs/flutter-apk/app-${{ matrix.arch }}-release.apk
